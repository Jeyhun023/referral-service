openapi: 3.0.3
info:
  title: Patient Referral System
  description: |
    Backend API for patient referral system.

    ## Authentication
    All endpoints require a static bearer token via the `Authorization` header.
    The token is configured server-side via the `API_SERVICE_TOKEN` environment variable.

    ## Idempotency
    POST endpoints support an optional `Idempotency-Key` header. When provided, the server
    caches the response for 24 hours and replays it on duplicate requests, returning an
    `X-Idempotency-Replayed: true` header.
  version: 1.0.0
  contact:
    name: Jeyhun Rashidov

servers:
  - url: http://localhost:8000/api/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Referrals
    description: Referral CRUD and lifecycle operations

paths:
  /referrals:
    post:
      tags: [Referrals]
      summary: Create referral
      description: |
        Creates a new referral in `received` status and dispatches an asynchronous
        triage job. Supports idempotency via the `Idempotency-Key` header.
      operationId: createReferral
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReferralRequest'
            example:
              patient_first_name: John
              patient_last_name: Doe
              patient_date_of_birth: "1990-05-15"
              patient_phone: "+1234567890"
              patient_email: john.doe@example.com
              reason: Chronic back pain requiring specialist evaluation
              priority: high
              source_system: EMR-System
              referring_provider: Dr. Jane Smith
              notes: Patient has history of lumbar issues
      responses:
        '201':
          description: Referral created successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-Idempotency-Replayed:
              $ref: '#/components/headers/X-Idempotency-Replayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

    get:
      tags: [Referrals]
      summary: List referrals
      description: Returns a paginated list of referrals with optional filters.
      operationId: listReferrals
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReferralStatus'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/ReferralPriority'
        - name: search
          in: query
          description: Search by patient name or source system
          schema:
            type: string
            maxLength: 255
        - name: date_from
          in: query
          description: Filter referrals created on or after this date
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter referrals created on or before this date
          schema:
            type: string
            format: date
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, priority, status, patient_last_name]
            default: created_at
        - name: sort_direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Paginated list of referrals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /referrals/{id}:
    get:
      tags: [Referrals]
      summary: Get referral
      description: Returns a single referral by ID.
      operationId: getReferral
      parameters:
        - $ref: '#/components/parameters/ReferralId'
      responses:
        '200':
          description: Referral details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /referrals/{id}/cancel:
    post:
      tags: [Referrals]
      summary: Cancel referral
      description: |
        Cancels a referral. Only allowed when status is `received` or `triaging`.
        Returns 422 if the referral is in a non-cancellable state.
      operationId: cancelReferral
      parameters:
        - $ref: '#/components/parameters/ReferralId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelReferralRequest'
            example:
              reason: Patient requested cancellation
      responses:
        '200':
          description: Referral cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cancellation not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Referral cannot be cancelled because it is currently Accepted.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Static service-to-service bearer token configured via API_SERVICE_TOKEN env var

  parameters:
    ReferralId:
      name: id
      in: path
      required: true
      description: Referral UUID
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Unique key for idempotent request. If a request with the same key was already
        processed, the cached response is returned with X-Idempotency-Replayed: true.
        Keys expire after 24 hours.
      schema:
        type: string
        format: uuid

  headers:
    X-RateLimit-Limit:
      description: Maximum requests per minute
      schema:
        type: integer
        example: 10
    X-RateLimit-Remaining:
      description: Remaining requests in current window
      schema:
        type: integer
        example: 9
    X-Idempotency-Replayed:
      description: Present and set to "true" when response is replayed from cache
      schema:
        type: string
        enum: ["true"]

  schemas:
    ReferralStatus:
      type: string
      enum: [received, triaging, accepted, rejected, cancelled]

    ReferralPriority:
      type: string
      enum: [urgent, high, normal, low]

    Patient:
      type: object
      properties:
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        date_of_birth:
          type: string
          format: date
          example: "1990-05-15"
        phone:
          type: string
          nullable: true
          example: "+1234567890"
        email:
          type: string
          format: email
          nullable: true
          example: john.doe@example.com

    Referral:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 9e3a1b4c-5d6e-7f8a-9b0c-1d2e3f4a5b6c
        patient:
          $ref: '#/components/schemas/Patient'
        reason:
          type: string
          example: Chronic back pain requiring specialist evaluation
        priority:
          $ref: '#/components/schemas/ReferralPriority'
        status:
          $ref: '#/components/schemas/ReferralStatus'
        source_system:
          type: string
          example: EMR-System
        referring_provider:
          type: string
          nullable: true
          example: Dr. Jane Smith
        notes:
          type: string
          nullable: true
          example: Patient has history of lumbar issues
        triaged_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-09T23:10:00+00:00"
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          example: null
        cancellation_reason:
          type: string
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-03-09T23:05:54+00:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-09T23:05:54+00:00"

    CreateReferralRequest:
      type: object
      required:
        - patient_first_name
        - patient_last_name
        - patient_date_of_birth
        - reason
        - source_system
      properties:
        patient_first_name:
          type: string
          maxLength: 255
          example: John
        patient_last_name:
          type: string
          maxLength: 255
          example: Doe
        patient_date_of_birth:
          type: string
          format: date
          description: Must be before today
          example: "1990-05-15"
        patient_phone:
          type: string
          maxLength: 20
          nullable: true
          example: "+1234567890"
        patient_email:
          type: string
          format: email
          maxLength: 255
          nullable: true
          example: john.doe@example.com
        reason:
          type: string
          maxLength: 2000
          example: Chronic back pain requiring specialist evaluation
        priority:
          $ref: '#/components/schemas/ReferralPriority'
        source_system:
          type: string
          maxLength: 255
          description: Identifier of the calling system
          example: EMR-System
        referring_provider:
          type: string
          maxLength: 255
          nullable: true
          example: Dr. Jane Smith
        notes:
          type: string
          maxLength: 5000
          nullable: true
          example: Patient has history of lumbar issues

    CancelReferralRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 2000
          nullable: true
          description: Optional cancellation reason
          example: Patient requested cancellation

    ReferralResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Referral'

    ReferralListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Referral'
        links:
          type: object
          properties:
            first:
              type: string
              format: uri
            last:
              type: string
              format: uri
            prev:
              type: string
              format: uri
              nullable: true
            next:
              type: string
              format: uri
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
              example: 1
            last_page:
              type: integer
              example: 3
            per_page:
              type: integer
              example: 15
            total:
              type: integer
              example: 42
            from:
              type: integer
              example: 1
            to:
              type: integer
              example: 15

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "The patient first name field is required. (and 4 more errors)"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            patient_first_name: ["Patient first name is required."]
            reason: ["Referral reason is required."]

  responses:
    Unauthorized:
      description: Missing or invalid API service token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Invalid or missing API service token.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "No query results for model [App\\Models\\Referral]."
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Too many referral submissions. Please try again later.
